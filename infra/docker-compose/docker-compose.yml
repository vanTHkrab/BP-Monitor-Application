name: bp-monitor

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bp-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bp-net

  api-gateway:
    build:
      context: ../../server/app/api-gateway
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      PORT: 3000
      S3_PROVIDER: ${S3_PROVIDER}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_DEFAULT_REGION: ${S3_DEFAULT_REGION}
      S3_USE_PATH_STYLE_ENDPOINT: ${S3_USE_PATH_STYLE_ENDPOINT}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bp-net

  ai-service:
    build:
      context: ../../server/app/ai-service
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Public R2 base URL the entrypoint downloads model artifacts from.
      # docker-entrypoint.sh refuses to start if this is unset or still
      # the placeholder value.
      AI_MODELS_R2_BASE_URL: ${AI_MODELS_R2_BASE_URL}
    volumes:
      # Persist downloaded model artifacts across container recreates so the
      # entrypoint's curl-from-R2 step only runs once per host.
      - ai_models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bp-net

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Server Actions (web/src/lib/gateway.ts, web/src/lib/ai-service.ts)
      # read these at request time and default to `http://localhost:*` if
      # unset — which inside this container resolves to the `web` container
      # itself, not api-gateway/ai-service. Point them at the compose
      # service names so the dashboard's server-side calls actually reach
      # their targets over bp-net. This closes a pre-existing gap: these
      # were never wired here before, so the ai-service health check on the
      # dashboard was silently broken in every dockerized environment,
      # nginx or not.
      GATEWAY_URL: http://api-gateway:3000
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      - api-gateway
    networks:
      - bp-net

volumes:
  postgres_data:
  redis_data:
  ai_models:

networks:
  bp-net:
    driver: bridge
